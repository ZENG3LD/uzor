[workspace]
members = [
    # Core
    "uzor-core",
    "uzor-layout",
    "uzor-render",
    "uzor-animation",
    # Platform
    "uzor-desktop",
    "uzor-web",
    "uzor-mobile",
    "uzor-tui",
    "uzor-macos",
    # UI
    "uzor-panels",
    "uzor-numbers",
    "uzor-text-fx",
    "uzor-cursor",
    "uzor-scroll-fx",
    "uzor-interactive",
    "uzor-panel-api",
    # Backends
    "uzor-backend-vello-common",
    "uzor-backend-vello-gpu",
    "uzor-backend-vello-cpu",
    "uzor-backend-vello-hybrid",
    "uzor-backend-tiny-skia",
    "uzor-backend-canvas2d",
    # Facade (feature-gated re-exports)
    "uzor-facade",
]
resolver = "2"

[workspace.package]
version = "1.0.0"
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/zeng3ld/uzor"
homepage = "https://github.com/zeng3ld/uzor"
keywords = ["ui", "rendering", "framework", "headless", "gpu"]
categories = ["gui", "rendering", "graphics"]

[workspace.dependencies]
uzor-core = { path = "./uzor-core" }
uzor-render = { path = "./uzor-render" }
uzor-animation = { path = "./uzor-animation" }
serde = { version = "1.0", features = ["derive"] }
