[workspace]
members = [
    # Font assets (published separately — large binary, rarely changes)
    "uzor-fonts",
    # Core library (contains render, animation, panels, panel_api, macos, layout, interactive, text_fx, cursor, numbers, scroll_fx)
    "uzor",
    # Platform
    "uzor-desktop",
    "uzor-framework",
    "uzor-web",
    "uzor-mobile",
    "uzor-tui",
    # Backends
    "uzor-backend-vello-common",
    "uzor-backend-vello-gpu",
    "uzor-backend-vello-cpu",
    "uzor-backend-vello-hybrid",
    "uzor-backend-tiny-skia",
    "uzor-backend-canvas2d",
    "uzor-backend-wgpu-instanced",
    # Utils
    "uzor-render-hub",
]
resolver = "2"

[workspace.package]
version = "1.1.4"
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/zeng3ld/uzor"
homepage = "https://github.com/zeng3ld/uzor"
keywords = ["ui", "rendering", "framework", "headless", "gpu"]
categories = ["gui", "rendering", "graphics"]

[workspace.dependencies]
uzor = { version = "1.1.4", path = "./uzor" }
uzor-fonts = { version = "1.0.1", path = "./uzor-fonts" }
uzor-render-hub = { version = "1.1.4", path = "./uzor-render-hub" }
uzor-backend-vello-gpu = { version = "1.1.4", path = "./uzor-backend-vello-gpu" }
uzor-backend-vello-hybrid = { version = "1.1.4", path = "./uzor-backend-vello-hybrid" }
uzor-backend-vello-cpu = { version = "1.1.4", path = "./uzor-backend-vello-cpu" }
uzor-backend-tiny-skia = { version = "1.1.4", path = "./uzor-backend-tiny-skia" }
uzor-backend-wgpu-instanced = { version = "1.1.4", path = "./uzor-backend-wgpu-instanced" }
serde = { version = "1.0", features = ["derive"] }

