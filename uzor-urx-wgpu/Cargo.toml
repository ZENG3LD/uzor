[package]
name        = "uzor-urx-wgpu"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "URX WGPU backend — consumes urx-core DrawCommand, dispatches to instanced-WGPU primitive pipelines (Quad SDF + Line capsule + Triangle + Text atlas). Wraps uzor-render-wgpu-instanced (the existing well-tested primitive crate) with the URX scene-consumer API + URX metrics."
keywords    = ["graphics", "rendering", "ui", "wgpu", "instanced"]
categories  = ["graphics", "rendering"]

[dependencies]
uzor-urx-core              = { workspace = true }
uzor-render-wgpu-instanced = { workspace = true }
uzor                       = { workspace = true }
metrics = "0.24"
wgpu    = "29"
# kurbo/peniko come transitively through urx-core, but pin explicitly
# for clarity in the DrawCommand → InstancedRenderContext adapter.
kurbo = "0.13"
peniko = "0.6"
