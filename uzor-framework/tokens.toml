# Mirage-derived design tokens for uzor-framework.
#
# Edited as TOML; `build.rs` codegens `src/tokens_generated.rs` exposing one
# Rust constant per entry.  Colors are emitted as `&'static str` (CSS hex /
# rgba), spacing as `f64` (logical px), radii as `f64`.
#
# Source: docs/mirage-target.md (Mirage Design System v1).

[colors.surface]
bg_0           = "#08090B"
bg             = "#0E0E11"
surface        = "#14151A"
surface_raised = "#1C1D23"
surface_hover  = "#23252C"
surface_inset  = "#0A0B0D"

[colors.fg]
fg_0          = "#F4F4F5"
fg_1          = "#D7D8DB"
fg_2          = "#878B91"
fg_3          = "#555860"
on_accent     = "#1A1400"

[colors.accent]
accent        = "#FBB26A"
accent_hover  = "#F9A04E"
accent_dim    = "rgba(251, 178, 106, 0.12)"
accent_wash   = "rgba(251, 178, 106, 0.06)"
accent_glow   = "rgba(251, 178, 106, 0.25)"
accent_border = "rgba(251, 178, 106, 0.30)"

[colors.l1]
l1            = "#6DB8F5"
l1_dim        = "rgba(109, 184, 245, 0.15)"
l1_border     = "rgba(109, 184, 245, 0.30)"

[colors.status]
ok            = "#5CB87A"
ok_dim        = "rgba(92, 184, 122, 0.10)"
ok_border     = "rgba(92, 184, 122, 0.28)"
warn          = "#E8A838"
warn_dim      = "rgba(232, 168, 56, 0.10)"
error         = "#EB5757"
error_dim     = "rgba(235, 87, 87, 0.10)"

[colors.border]
border        = "rgba(255, 255, 255, 0.06)"
border_strong = "rgba(255, 255, 255, 0.12)"
border_accent = "rgba(251, 178, 106, 0.30)"
chip          = "rgba(255, 255, 255, 0.04)"
overlay_soft  = "rgba(14, 14, 17, 0.85)"

[radii]
xs   = 4.0
sm   = 6.0
md   = 8.0
lg   = 12.0
pill = 999.0

[space]
s0   = 2.0
s1   = 4.0
s2   = 8.0
s3   = 12.0
s4   = 16.0
s5   = 20.0
s6   = 24.0
s8   = 32.0
s10  = 40.0
s12  = 48.0
s16  = 64.0
s20  = 80.0
s24  = 96.0

[type_scale]
hero        = 96.0
display     = 56.0
h1          = 36.0
h2          = 24.0
h3          = 19.0
h4          = 16.0
body_lg     = 17.0
body        = 15.0
sm          = 13.0
xs          = 12.0
micro       = 11.0

[type_weight]
regular  = 400
medium   = 500
semibold = 600
bold     = 700

[fonts]
display = "Space Grotesk, PT Root UI, Inter, system-ui, sans-serif"
sans    = "PT Root UI, Inter, system-ui, -apple-system, sans-serif"
mono    = "JetBrains Mono, ui-monospace, SF Mono, Menlo, monospace"
body    = "Roboto, system-ui, sans-serif"

[layout]
container_max  = 1280.0
container_tight= 1160.0
header_h       = 56.0
