name: Publish to crates.io

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    name: Publish crates in dependency order
    runs-on: ubuntu-latest
    environment: crates-io
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-publish-

      - name: Publish all crates
        shell: bash
        run: |
          set +e

          # Read workspace version from Cargo.toml
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "Workspace version: $VERSION"

          # Check if crate+version already exists on crates.io (fast, no compilation)
          is_published() {
            local pkg="$1"
            local ver="$2"
            local response
            response=$(curl -s "https://crates.io/api/v1/crates/$pkg/$ver")
            if echo "$response" | grep -q "\"num\":\"$ver\""; then
              return 0  # already published
            fi
            return 1  # not published
          }

          publish_crate() {
            local pkg="$1"
            echo "::group::Publishing $pkg"

            # Fast check via API — no cargo needed
            if is_published "$pkg" "$VERSION"; then
              echo "✓ $pkg $VERSION already on crates.io, skipping"
              echo "::endgroup::"
              return 2
            fi

            for attempt in 1 2 3 4 5; do
              echo "Attempt $attempt for $pkg..."
              OUTPUT=$(cargo publish --package "$pkg" --allow-dirty 2>&1)
              CODE=$?
              echo "$OUTPUT"

              if [ $CODE -eq 0 ]; then
                echo "✓ $pkg published successfully"
                echo "::endgroup::"
                return 0
              fi

              if echo "$OUTPUT" | grep -q "already uploaded"; then
                echo "✓ $pkg already uploaded, skipping"
                echo "::endgroup::"
                return 2
              fi

              if echo "$OUTPUT" | grep -q "429 Too Many Requests"; then
                RETRY_AFTER=$(echo "$OUTPUT" | grep -oP 'try again after \K[^"]+(?= and)')
                if [ -n "$RETRY_AFTER" ]; then
                  RETRY_EPOCH=$(date -d "$RETRY_AFTER" +%s 2>/dev/null || echo "")
                  NOW_EPOCH=$(date +%s)
                  if [ -n "$RETRY_EPOCH" ] && [ "$RETRY_EPOCH" -gt "$NOW_EPOCH" ]; then
                    WAIT_SECS=$(( RETRY_EPOCH - NOW_EPOCH + 15 ))
                    echo "⏳ Rate limited. Waiting ${WAIT_SECS}s..."
                    sleep "$WAIT_SECS"
                    continue
                  fi
                fi
                echo "⏳ Rate limited, waiting 300s..."
                sleep 300
                continue
              fi

              if [ $attempt -lt 5 ]; then
                echo "⏳ Failed (exit $CODE), retrying in 180s..."
                sleep 180
              fi
            done

            echo "✗ $pkg FAILED after 5 attempts"
            echo "::endgroup::"
            return 1
          }

          # Publish with post-publish wait only for NEW publishes
          pub() {
            local pkg="$1"
            local wait="$2"
            publish_crate "$pkg"
            local rc=$?
            if [ $rc -eq 1 ]; then
              FAILED="$FAILED $pkg"
            elif [ $rc -eq 0 ]; then
              echo "Waiting ${wait}s for crates.io index..."
              sleep "$wait"
            fi
          }

          FAILED=""

          echo "=== TIER 1 ==="
          pub uzor-render 30
          pub uzor-animation 60

          echo "=== TIER 2 ==="
          pub uzor-core 60
          pub uzor-backend-vello-common 60
          pub uzor-backend-vello-gpu 60
          pub uzor-backend-vello-cpu 60
          pub uzor-backend-vello-hybrid 60
          pub uzor-backend-tiny-skia 60
          pub uzor-backend-canvas2d 120

          echo "=== TIER 3 ==="
          pub uzor-layout 60
          pub uzor-desktop 60
          pub uzor-web 60
          pub uzor-mobile 60
          pub uzor-tui 60
          pub uzor-macos 60
          pub uzor-panels 60
          pub uzor-numbers 60
          pub uzor-text-fx 60
          pub uzor-cursor 60
          pub uzor-scroll-fx 60
          pub uzor-interactive 60
          pub uzor-panel-api 120

          echo "=== TIER 4 ==="
          pub uzor 0

          if [ -n "$FAILED" ]; then
            echo ""
            echo "::error::Failed crates:$FAILED"
            exit 1
          fi

          echo ""
          echo "✓ All crates published successfully!"
