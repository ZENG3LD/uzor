name: Publish to crates.io

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Publish crates in dependency order
    runs-on: ubuntu-latest
    environment: crates-io

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-publish-

      # -----------------------------------------------------------------------
      # Tier 1 — leaf crates (no internal uzor deps)
      # -----------------------------------------------------------------------

      - name: "[Tier 1] Publish uzor-render"
        run: cargo publish --package uzor-render --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: "[Tier 1] Wait between publishes"
        run: sleep 10

      - name: "[Tier 1] Publish uzor-animation"
        run: cargo publish --package uzor-animation --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: "Wait for crates.io index to update after Tier 1"
        run: sleep 30

      # -----------------------------------------------------------------------
      # Tier 2 — depends on Tier 1
      # -----------------------------------------------------------------------

      - name: "[Tier 2] Publish uzor-core"
        run: cargo publish --package uzor-core --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: "[Tier 2] Wait between publishes"
        run: sleep 10

      - name: "[Tier 2] Publish uzor-backend-vello-common"
        run: cargo publish --package uzor-backend-vello-common --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: "[Tier 2] Wait between publishes"
        run: sleep 10

      - name: "[Tier 2] Publish uzor-backend-vello-gpu"
        run: cargo publish --package uzor-backend-vello-gpu --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: "[Tier 2] Wait between publishes"
        run: sleep 10

      - name: "[Tier 2] Publish uzor-backend-vello-cpu"
        run: cargo publish --package uzor-backend-vello-cpu --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: "[Tier 2] Wait between publishes"
        run: sleep 10

      - name: "[Tier 2] Publish uzor-backend-vello-hybrid"
        run: cargo publish --package uzor-backend-vello-hybrid --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: "[Tier 2] Wait between publishes"
        run: sleep 10

      - name: "[Tier 2] Publish uzor-backend-tiny-skia"
        run: cargo publish --package uzor-backend-tiny-skia --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: "[Tier 2] Wait between publishes"
        run: sleep 10

      - name: "[Tier 2] Publish uzor-backend-canvas2d"
        run: cargo publish --package uzor-backend-canvas2d --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: "Wait for crates.io index to update after Tier 2"
        run: sleep 30

      # -----------------------------------------------------------------------
      # Tier 3 — depends on Tier 2
      # -----------------------------------------------------------------------

      - name: "[Tier 3] Publish uzor-layout"
        run: cargo publish --package uzor-layout --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: "[Tier 3] Wait between publishes"
        run: sleep 10

      - name: "[Tier 3] Publish uzor-desktop"
        run: cargo publish --package uzor-desktop --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: "[Tier 3] Wait between publishes"
        run: sleep 10

      - name: "[Tier 3] Publish uzor-web"
        run: cargo publish --package uzor-web --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: "[Tier 3] Wait between publishes"
        run: sleep 10

      - name: "[Tier 3] Publish uzor-mobile"
        run: cargo publish --package uzor-mobile --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: "[Tier 3] Wait between publishes"
        run: sleep 10

      - name: "[Tier 3] Publish uzor-tui"
        run: cargo publish --package uzor-tui --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: "[Tier 3] Wait between publishes"
        run: sleep 10

      - name: "[Tier 3] Publish uzor-macos"
        run: cargo publish --package uzor-macos --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: "[Tier 3] Wait between publishes"
        run: sleep 10

      - name: "[Tier 3] Publish uzor-panels"
        run: cargo publish --package uzor-panels --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: "[Tier 3] Wait between publishes"
        run: sleep 10

      - name: "[Tier 3] Publish uzor-numbers"
        run: cargo publish --package uzor-numbers --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: "[Tier 3] Wait between publishes"
        run: sleep 10

      - name: "[Tier 3] Publish uzor-text-fx"
        run: cargo publish --package uzor-text-fx --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: "[Tier 3] Wait between publishes"
        run: sleep 10

      - name: "[Tier 3] Publish uzor-cursor"
        run: cargo publish --package uzor-cursor --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: "[Tier 3] Wait between publishes"
        run: sleep 10

      - name: "[Tier 3] Publish uzor-scroll-fx"
        run: cargo publish --package uzor-scroll-fx --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: "[Tier 3] Wait between publishes"
        run: sleep 10

      - name: "[Tier 3] Publish uzor-interactive"
        run: cargo publish --package uzor-interactive --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: "[Tier 3] Wait between publishes"
        run: sleep 10

      - name: "[Tier 3] Publish uzor-panel-api"
        run: cargo publish --package uzor-panel-api --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: "Wait for crates.io index to update after Tier 3"
        run: sleep 30

      # -----------------------------------------------------------------------
      # Tier 4 — facade crate (depends on everything)
      # -----------------------------------------------------------------------

      - name: "[Tier 4] Publish uzor (facade)"
        run: cargo publish --package uzor --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
