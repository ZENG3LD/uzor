[package]
name = "uzor-window-hub"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
keywords.workspace = true
categories.workspace = true
description = "uzor-window-hub: unified window provider hub. Selects desktop / web / mobile platform crate via feature flags. Mirrors uzor-render-hub pattern."

[dependencies]
uzor = { workspace = true }
uzor-window-desktop = { workspace = true, optional = true }
uzor-window-web     = { workspace = true, optional = true }
uzor-window-mobile  = { workspace = true, optional = true }

[features]
default = ["desktop"]
desktop = ["uzor-window-desktop"]
web     = ["uzor-window-web"]
mobile  = ["uzor-window-mobile"]
