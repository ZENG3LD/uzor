[package]
name = "uzor"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Core UI engine — geometry, interaction, input state"
readme = "../README.md"

[dependencies]
uzor-fonts = { workspace = true }
image = { version = "0.25", default-features = false, features = ["png"], optional = true }
serde = { workspace = true }
serde_json = "1.0"
log = "0.4"
smallvec = { version = "1.10", features = ["serde"] }
bitflags = "2.0"
num-traits = "0.2"
thiserror = "1.0"
parking_lot = "0.12"
ahash = { version = "0.8", default-features = false, features = ["compile-time-rng"] }
slotmap = "1.0"
fastrand = "2"

[features]
default = ["framework-png"]
serde = []
animation = []
# PNG icon decoding for AppBuilder::icon_from_png. On by default; turn off
# if you don't ship `image` (e.g. minimal embedded builds).
framework-png = ["dep:image"]

[dev-dependencies]
env_logger = "0.10"
