edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "High-performance instanced wgpu rendering backend"
readme = "../README.md"

[dependencies]
uzor = { workspace = true }
wgpu = "29"
bytemuck = { version = "1", features = ["derive"] }
