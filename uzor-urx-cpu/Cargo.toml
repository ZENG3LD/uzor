[package]
name        = "uzor-urx-cpu"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "URX CPU backend — own scanline rasteriser. Consumes urx-core DrawCommand, outputs premultiplied RGBA8 Pixmap. No tiny_skia/vello_cpu dep (math too buggy, write own)."
keywords    = ["graphics", "rendering", "ui", "cpu", "rasterizer"]
categories  = ["graphics", "rendering"]

[dependencies]
uzor-urx-core = { workspace = true }
metrics = "0.24"
kurbo = "0.11"
rayon = { version = "1", optional = true }
uzor-urx-glyph = { workspace = true, optional = true }
# Image decode is opt-in: image crate pulls a non-trivial dep tree and
# consumers that pre-decode into Vec<u8> don't need it.
image = { version = "0.25", default-features = false, features = ["png", "jpeg"], optional = true }

[dev-dependencies]
criterion = "0.5"
# Apples-to-apples reference baseline. vello_cpu is the "industry"
# software rasteriser; URX exists explicitly to replace it. The
# compare bench feeds both the same scene of fill rects.
vello_cpu  = { version = "0.0.7", features = ["std"] }
tiny-skia  = "0.11"

[[bench]]
name = "render"
harness = false

[[bench]]
name = "compare_baselines"
harness = false

[features]
default = []
parallel = ["dep:rayon"]
image-decode = ["dep:image"]
# Enable glyph rasterisation via urx-glyph. Adds ~30 deps (swash chain).
glyph = ["dep:uzor-urx-glyph"]
