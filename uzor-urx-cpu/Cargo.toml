[package]
name        = "uzor-urx-cpu"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "URX CPU backend — own scanline rasteriser. Consumes urx-core DrawCommand, outputs premultiplied RGBA8 Pixmap. No tiny_skia/vello_cpu dep (math too buggy, write own)."
keywords    = ["graphics", "rendering", "ui", "cpu", "rasterizer"]
categories  = ["graphics", "rendering"]

[dependencies]
uzor-urx-core = { workspace = true }
metrics = "0.24"
kurbo = "0.11"
rayon = { version = "1", optional = true }
uzor-urx-glyph = { workspace = true, optional = true }
image = { version = "0.25", default-features = false, features = ["png", "jpeg"], optional = true }
# `wide` provides portable SIMD types (f32x4/x8, u8x16/x32, i32x4/x8)
# that compile to AVX2 on x86_64 and NEON on aarch64 from the SAME
# source. Math + algorithm stay ours — wide is just register types +
# lane ops. License: MIT/Apache-2.0/Zlib. Transitive deps: 2.
wide = "1"
multiversion = "0.8"
bytemuck = { version = "1", features = ["derive"] }
# Per-frame arena allocator for tile cmd lists. Zero per-frame
# malloc/free; everything in one slab reset between frames. MIT/Apache,
# zero transitive deps.
bumpalo = { version = "3", features = ["collections"] }

[dev-dependencies]
criterion = "0.5"
vello_cpu  = { version = "0.0.7", features = ["std"] }
tiny-skia  = "0.11"

[[bench]]
name = "render"
harness = false

[[bench]]
name = "compare_baselines"
harness = false

[[bench]]
name = "inner_loops"
harness = false

[[bench]]
name = "compare_tiled"
harness = false

[[bench]]
name = "panned_scene"
harness = false

[features]
default = []
parallel = ["dep:rayon"]
image-decode = ["dep:image"]
# Enable glyph rasterisation via urx-glyph. Adds ~30 deps (swash chain).
glyph = ["dep:uzor-urx-glyph"]
