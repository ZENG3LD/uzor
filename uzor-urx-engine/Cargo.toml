[package]
name        = "uzor-urx-engine"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "URX engine — cross-backend façade with per-region dirty tracking, needs_paint() cadence hook, RenderCadence policy. Consumes urx-core Scene + DirtyState; dispatches to urx-cpu / urx-wgpu / urx-hybrid."
keywords    = ["graphics", "rendering", "ui", "engine"]
categories  = ["graphics", "rendering"]

[dependencies]
uzor-urx-core = { workspace = true }
uzor-urx-cpu  = { workspace = true }
metrics = "0.24"

# uzor-urx-wgpu is opt-in via feature so consumers that only want CPU
# (headless / CI / embedded) can skip the wgpu dep tree entirely.
uzor-urx-wgpu      = { workspace = true, optional = true }
uzor-urx-hybrid    = { workspace = true, optional = true }
uzor-urx-wgpu-full = { workspace = true, optional = true }
wgpu = { version = "29", optional = true }

[features]
default = ["wgpu-backend"]
wgpu-backend = ["dep:uzor-urx-wgpu"]
hybrid-backend = ["dep:uzor-urx-hybrid", "dep:wgpu"]
# URX 1.6 full-GPU compute pipeline (encode → tile → fine → blit).
# Wires Backend::FullGpu + RenderTarget::FullGpu into render(); auto()
# picks it when WorkloadHint::heavy_compute is true.
full-gpu-backend = ["dep:uzor-urx-wgpu-full", "dep:wgpu"]

[dev-dependencies]
pollster   = "0.4"
wgpu       = "29"
winit      = "0.30"
peniko = "0.6"
# Agentic control plane (3-level HTTP) for winit_full_gpu_demo.
axum       = { version = "0.7", default-features = false, features = ["tokio", "http1", "json", "query"] }
tokio      = { version = "1", features = ["rt-multi-thread", "sync", "macros", "net"] }
serde      = { version = "1", features = ["derive"] }
serde_json = "1"

[[example]]
name = "backend_auto_demo"

[[example]]
name = "runtime_backend_switch"

[[example]]
name = "winit_full_gpu_demo"
required-features = ["full-gpu-backend"]
